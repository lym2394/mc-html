<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>LYM2394的导航</title>
    <!-- Markdown 解析 & 代码高亮 -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen', 'Ubuntu', 'Cantarell', 'Fira Sans', 'Droid Sans', 'Helvetica Neue', sans-serif;
            background: #f9fafb;
            color: #1e293b;
            height: 100vh;
            overflow: hidden;
        }

        .app {
            display: flex;
            height: 100vh;
            background: #ffffff;
        }

        /* 左侧边栏 - 文档列表 */
        .sidebar {
            width: 320px;
            background: #f8fafc;
            border-right: 1px solid #e2e8f0;
            display: flex;
            flex-direction: column;
            transition: all 0.2s ease;
        }

        .sidebar-header {
            padding: 20px 20px 16px 20px;
            border-bottom: 1px solid #e2e8f0;
        }

        .sidebar-header h2 {
            font-size: 1.25rem;
            font-weight: 600;
            color: #0f172a;
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 4px;
        }

        .sidebar-header p {
            font-size: 0.85rem;
            color: #64748b;
            margin-top: 4px;
        }

        /* 分类切换标签 */
        .category-tabs {
            display: flex;
            border-bottom: 1px solid #e2e8f0;
            background: #ffffff;
        }

        .cat-tab {
            flex: 1;
            text-align: center;
            padding: 10px 0;
            font-size: 0.9rem;
            font-weight: 500;
            color: #64748b;
            cursor: pointer;
            border: none;
            background: transparent;
            border-bottom: 2px solid transparent;
            transition: all 0.1s;
        }

        .cat-tab:hover {
            background: #f1f5f9;
            color: #1e293b;
        }

        .cat-tab.active {
            color: #1e40af;
            border-bottom-color: #3b82f6;
            font-weight: 600;
        }

        .doc-list {
            flex: 1;
            overflow-y: auto;
            padding: 8px 0;
            scrollbar-width: thin;
            scrollbar-color: #cbd5e1 #f1f5f9;
        }

        .doc-list::-webkit-scrollbar {
            width: 6px;
        }

        .doc-list::-webkit-scrollbar-track {
            background: #f1f5f9;
        }

        .doc-list::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 3px;
        }

        .doc-list::-webkit-scrollbar-thumb:hover {
            background: #94a3b8;
        }

        .doc-item {
            padding: 12px 20px;
            margin: 2px 8px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.15s ease;
            display: flex;
            align-items: center;
            gap: 12px;
            color: #334155;
            font-size: 0.95rem;
            border-left: 3px solid transparent;
        }

        .doc-item:hover {
            background: #eef2ff;
            color: #1e293b;
        }

        .doc-item.active {
            background: #e0e7ff;
            color: #1e40af;
            border-left-color: #3b82f6;
            font-weight: 500;
        }

        .doc-icon {
            width: 20px;
            height: 20px;
            opacity: 0.7;
            flex-shrink: 0;
        }

        .doc-info {
            flex: 1;
            min-width: 0;
        }

        .doc-title {
            font-weight: 500;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .doc-filename {
            font-size: 0.75rem;
            color: #64748b;
            margin-top: 2px;
        }

        .doc-item.active .doc-filename {
            color: #3b82f6;
        }

        .empty-state {
            padding: 40px 20px;
            text-align: center;
            color: #94a3b8;
            font-size: 0.9rem;
        }

        .empty-state svg {
            width: 48px;
            height: 48px;
            margin-bottom: 16px;
            opacity: 0.5;
        }

        /* 右侧内容区 */
        .content {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #ffffff;
            overflow: hidden;
        }

        .content-header {
            padding: 16px 32px;
            border-bottom: 1px solid #e2e8f0;
            background: #ffffff;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .content-title {
            font-size: 1.1rem;
            font-weight: 500;
            color: #0f172a;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .content-badge {
            background: #dbeafe;
            color: #1e40af;
            padding: 2px 10px;
            border-radius: 12px;
            font-size: 0.75rem;
            font-weight: 500;
        }

        .content-body {
            flex: 1;
            overflow-y: auto;
            padding: 32px 48px;
            scroll-behavior: smooth;
        }

        .markdown-body {
            max-width: 900px;
            margin: 0 auto;
            line-height: 1.7;
        }

        /* Markdown 样式优化 */
        .markdown-body h1 {
            font-size: 2rem;
            font-weight: 600;
            margin-top: 0;
            margin-bottom: 1rem;
            padding-bottom: 0.5rem;
            border-bottom: 1px solid #e2e8f0;
            color: #0f172a;
        }

        .markdown-body h2 {
            font-size: 1.5rem;
            font-weight: 600;
            margin-top: 2rem;
            margin-bottom: 1rem;
            color: #1e293b;
        }

        .markdown-body h3 {
            font-size: 1.25rem;
            font-weight: 600;
            margin-top: 1.5rem;
            margin-bottom: 0.75rem;
            color: #334155;
        }

        .markdown-body p {
            margin-bottom: 1rem;
            color: #334155;
        }

        .markdown-body code {
            background: #f1f5f9;
            padding: 0.2rem 0.4rem;
            border-radius: 4px;
            font-size: 0.9em;
            color: #1e293b;
        }

        .markdown-body pre {
            background: #1e293b;
            border-radius: 8px;
            padding: 1rem;
            overflow-x: auto;
            margin: 1.5rem 0;
        }

        .markdown-body pre code {
            background: transparent;
            padding: 0;
            color: #e2e8f0;
        }

        .markdown-body blockquote {
            border-left: 4px solid #3b82f6;
            padding-left: 1rem;
            margin: 1rem 0;
            color: #64748b;
            font-style: italic;
        }

        .markdown-body ul, .markdown-body ol {
            margin: 1rem 0;
            padding-left: 2rem;
        }

        .markdown-body li {
            margin: 0.5rem 0;
        }

        .markdown-body a {
            color: #3b82f6;
            text-decoration: none;
        }

        .markdown-body a:hover {
            text-decoration: underline;
        }

        .markdown-body table {
            width: 100%;
            border-collapse: collapse;
            margin: 1rem 0;
        }

        .markdown-body th, .markdown-body td {
            border: 1px solid #e2e8f0;
            padding: 0.75rem;
            text-align: left;
        }

        .markdown-body th {
            background: #f8fafc;
            font-weight: 600;
        }

        /* iframe 容器 */
        .iframe-container {
            width: 100%;
            height: 100%;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            overflow: hidden;
            background: #ffffff;
        }

        .iframe-container iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        .welcome-message {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            text-align: center;
            color: #94a3b8;
        }

        .welcome-message svg {
            width: 80px;
            height: 80px;
            margin-bottom: 20px;
            opacity: 0.4;
        }

        .welcome-message h3 {
            font-size: 1.5rem;
            font-weight: 500;
            margin-bottom: 8px;
            color: #64748b;
        }

        .welcome-message p {
            color: #94a3b8;
        }

        .loading-spinner {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100%;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid #e2e8f0;
            border-top-color: #3b82f6;
            border-radius: 50%;
            animation: spin 0.8s infinite linear;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* 移动端适配 */
        @media (max-width: 768px) {
            .sidebar {
                width: 280px;
            }
            
            .content-body {
                padding: 24px 20px;
            }
        }
    </style>
</head>
<body>
    <div class="app">
        <!-- 左侧文档列表 -->
        <div class="sidebar">
            <div class="sidebar-header">
                <h2>
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M4 4h16v16H4z"/>
                        <path d="M8 8h8M8 12h8M8 16h5"/>
                    </svg>
                    导航列表
                </h2>
                <p id="sidebarHint">/md/ 目录下的技术文档</p>
            </div>

            <!-- 分类切换标签 -->
            <div class="category-tabs">
                <button class="cat-tab active" data-cat="md">📄 技术文档</button>
                <button class="cat-tab" data-cat="html">🌐 站内网站</button>
            </div>

            <div class="doc-list" id="docList">
                <div class="empty-state">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                        <path d="M4 4h16v16H4z"/>
                        <path d="M8 8h8M8 12h8M8 16h5"/>
                    </svg>
                    <p>正在检测 MD 文件...</p>
                </div>
            </div>
        </div>

        <!-- 右侧内容区 -->
        <div class="content">
            <div class="content-header" id="contentHeader">
                <div class="content-title">
                    <span id="currentDocTitle">选择导航文件</span>
                    <span class="content-badge" id="docBadge" style="display: none;"></span>
                </div>
            </div>
            <div class="content-body" id="contentBody">
                <div class="welcome-message">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                        <path d="M4 4h16v16H4z"/>
                        <path d="M8 8h8M8 12h8M8 16h5"/>
                    </svg>
                    <h3>欢迎使用LYM2394的导航</h3>
                    <p>请从左侧选择一个文件开始阅读</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        (function() {
            "use strict";

            // 配置 marked
            if (typeof marked !== 'undefined') {
                marked.setOptions({
                    highlight: function(code, lang) {
                        if (typeof hljs !== 'undefined' && lang && hljs.getLanguage(lang)) {
                            try {
                                return hljs.highlight(code, { language: lang }).value;
                            } catch (e) {}
                        }
                        return code;
                    },
                    breaks: true,
                    gfm: true
                });
            }

            const TOTAL_FILES = 2394; // 0001 到 2394
            const docListEl = document.getElementById('docList');
            const contentBody = document.getElementById('contentBody');
            const currentDocTitle = document.getElementById('currentDocTitle');
            const docBadge = document.getElementById('docBadge');
            const sidebarHint = document.getElementById('sidebarHint');

            let currentCategory = 'md'; // 'md' 或 'html'
            let activeFile = null; // { index, category }
            const docItems = new Map(); // key: 'md-0005' -> DOM element
            const cache = new Map(); // key: 'md-0005' -> { title, html, filename }

            // 分类切换
            const catTabs = document.querySelectorAll('.cat-tab');
            catTabs.forEach(tab => {
                tab.addEventListener('click', () => {
                    const cat = tab.dataset.cat;
                    if (cat === currentCategory) return;
                    catTabs.forEach(t => t.classList.remove('active'));
                    tab.classList.add('active');
                    currentCategory = cat;
                    // 更新提示文字
                    sidebarHint.textContent = cat === 'md' ? '/md/ 目录下的技术文档' : '/html/ 目录下的网站页面';
                    // 清空右侧
                    contentBody.innerHTML = `
                        <div class="welcome-message">
                            <h3>${cat === 'md' ? '技术文档' : '站内网站'}</h3>
                            <p>点击左侧文件加载内容</p>
                        </div>`;
                    currentDocTitle.textContent = '选择导航文件';
                    docBadge.style.display = 'none';
                    // 重新加载列表
                    loadDocList(cat);
                });
            });

            // 补零到4位
            function padIndex(i) {
                return i.toString().padStart(4, '0');
            }

            // 检测文件是否存在并提取标题
            async function checkAndGetDocInfo(index, category) {
                const padded = padIndex(index);
                const url = category === 'md' ? `./md/${padded}.md` : `./html/${padded}.html`;
                
                try {
                    const response = await fetch(url, { method: 'HEAD' });
                    if (!response.ok) {
                        return null;
                    }
                    
                    // 获取内容用于提取标题
                    const contentResponse = await fetch(url);
                    const text = await contentResponse.text();
                    
                    let title = null;
                    if (category === 'md') {
                        const match = text.match(/^#\s+(.*?)(?:\r?\n|$)/m);
                        if (match && match[1]) title = match[1].trim();
                    } else { // html
                        const match = text.match(/<title>(.*?)<\/title>/i);
                        if (match && match[1]) title = match[1].trim();
                    }
                    
                    if (!title) title = `${padded}.${category}`;
                    
                    let html = '';
                    if (category === 'md') {
                        html = typeof marked !== 'undefined' ? marked.parse(text) : `<pre>${text}</pre>`;
                    } else {
                        html = url; // 储存URL用于iframe
                    }
                    
                    return {
                        title: title,
                        html: html,
                        filename: `${padded}.${category}`,
                        exists: true,
                        category: category
                    };
                } catch (error) {
                    console.warn(`无法访问 ${url}:`, error);
                    return null;
                }
            }

            // 加载并渲染文档列表
            async function loadDocList(category) {
                docListEl.innerHTML = '<div class="empty-state"><p>正在检测文件...</p></div>';
                
                const checks = [];
                for (let i = 1; i <= TOTAL_FILES; i++) {
                    checks.push(checkAndGetDocInfo(i, category));
                }
                
                const results = await Promise.all(checks);
                
                docListEl.innerHTML = '';
                let hasDocs = false;
                
                results.forEach((docInfo, idx) => {
                    const index = idx + 1;
                    if (docInfo && docInfo.exists) {
                        hasDocs = true;
                        const key = category + '-' + padIndex(index);
                        cache.set(key, docInfo);
                        
                        const docItem = createDocItem(index, docInfo, category);
                        docListEl.appendChild(docItem);
                        docItems.set(key, docItem);
                    }
                });
                
                if (!hasDocs) {
                    docListEl.innerHTML = `
                        <div class="empty-state">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                                <path d="M4 4h16v16H4z"/>
                                <path d="M8 8h8M8 12h8M8 16h5"/>
                            </svg>
                            <p>未检测到文件</p>
                            <p style="margin-top: 8px; font-size: 0.85rem;">目录当前没有可用文件</p>
                        </div>
                    `;
                }
            }

            // 创建列表项
            function createDocItem(index, docInfo, category) {
                const div = document.createElement('div');
                div.className = 'doc-item';
                div.dataset.index = index;
                div.dataset.cat = category;
                
                const displayTitle = docInfo.title.length > 30 ? 
                    docInfo.title.slice(0, 28) + '…' : docInfo.title;
                
                div.innerHTML = `
                    <svg class="doc-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M4 4h16v16H4z"/>
                        <path d="M8 8h8M8 12h8M8 16h5"/>
                    </svg>
                    <div class="doc-info">
                        <div class="doc-title">${escapeHtml(displayTitle)}</div>
                        <div class="doc-filename">${docInfo.filename}</div>
                    </div>
                `;
                
                div.addEventListener('click', () => {
                    loadDocument(index, category);
                });
                
                return div;
            }

            // 加载并显示文档
            async function loadDocument(index, category) {
                // 更新激活状态
                if (activeFile) {
                    const prevKey = activeFile.category + '-' + padIndex(activeFile.index);
                    const prevItem = docItems.get(prevKey);
                    if (prevItem) prevItem.classList.remove('active');
                }
                
                const currentKey = category + '-' + padIndex(index);
                const currentItem = docItems.get(currentKey);
                if (currentItem) currentItem.classList.add('active');
                
                activeFile = { index, category };
                
                // 如果缓存中有，直接显示
                if (cache.has(currentKey)) {
                    const docInfo = cache.get(currentKey);
                    displayDocument(docInfo, index, category);
                    return;
                }
                
                // 显示加载状态
                contentBody.innerHTML = '<div class="loading-spinner"><div class="spinner"></div></div>';
                currentDocTitle.textContent = '加载中...';
                docBadge.style.display = 'none';
                
                const docInfo = await checkAndGetDocInfo(index, category);
                if (docInfo && docInfo.exists) {
                    cache.set(currentKey, docInfo);
                    displayDocument(docInfo, index, category);
                    
                    // 更新列表标题
                    if (currentItem) {
                        const titleEl = currentItem.querySelector('.doc-title');
                        const displayTitle = docInfo.title.length > 30 ? 
                            docInfo.title.slice(0, 28) + '…' : docInfo.title;
                        titleEl.textContent = displayTitle;
                    }
                } else {
                    contentBody.innerHTML = `
                        <div class="welcome-message">
                            <h3>无法加载文件</h3>
                            <p>文件可能已被移除或无法访问</p>
                        </div>
                    `;
                    currentDocTitle.textContent = '选择导航文件';
                }
            }

            // 显示文档内容
            function displayDocument(docInfo, index, category) {
                const padded = padIndex(index);
                currentDocTitle.textContent = docInfo.title;
                docBadge.textContent = docInfo.filename;
                docBadge.style.display = 'inline-block';
                
                if (category === 'md') {
                    contentBody.innerHTML = `<div class="markdown-body">${docInfo.html}</div>`;
                    // 代码高亮
                    if (typeof hljs !== 'undefined') {
                        contentBody.querySelectorAll('pre code').forEach(block => {
                            if (!block.classList.contains('hljs')) {
                                hljs.highlightElement(block);
                            }
                        });
                    }
                } else { // HTML iframe
                    contentBody.innerHTML = `
                        <div class="iframe-container">
                            <iframe src="./html/${docInfo.filename}" sandbox="allow-same-origin allow-scripts" title="${docInfo.title}"></iframe>
                        </div>`;
                }
            }

            function escapeHtml(text) {
                const div = document.createElement('div');
                div.textContent = text;
                return div.innerHTML;
            }

            // 初始化：默认加载 MD 分类
            loadDocList('md');
        })();
    </script>
</body>
</html>
